services:
  database:
    image: postgres:15
    container_name: ems-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: EMSNew
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d EMSNew"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-python:
    build:
      context: ./ems-backend-python
      dockerfile: Dockerfile
    container_name: ems-backend-python
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=database
      - DB_PORT=5432
      - DB_NAME=EMSNew
      - DB_USER=postgres
      - DB_PASSWORD=1234
      - GROQ_API_KEY=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
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
      - TZ=Asia/Kolkata
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./ems-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_CHATBOT_API_URL: /api/chatbot
        VITE_PARSER_URL: ""
    container_name: ems-frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE_URL=/api
      - VITE_CHATBOT_API_URL=/api/chatbot
      - VITE_PARSER_URL=
      - BACKEND_URL=http://backend-python:8000
    depends_on:
      - backend-python

volumes:
  postgres_data:
