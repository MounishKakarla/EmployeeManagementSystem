name: Build Android APK

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile (preview | production)"
        required: false
        default: "preview"

# Cancel any in-progress build for the same ref so pushes don't queue up
concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: EAS Build (Android APK)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node setup with npm cache ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: EmployeeManagementSystem/ems-frontendNative/package-lock.json

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        working-directory: EmployeeManagementSystem/ems-frontendNative
        run: npm ci

      # ── 4. EAS CLI + auth via EXPO_TOKEN secret ──────────────────────────────
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # ── 5. Determine build profile ────────────────────────────────────────────
      #   • manual dispatch  → use the chosen input
      #   • tag push (v*)    → production
      #   • branch push      → preview (APK)
      - name: Resolve build profile
        id: profile
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.profile }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "name=production" >> $GITHUB_OUTPUT
          else
            echo "name=preview" >> $GITHUB_OUTPUT
          fi

      # ── 6. EAS Build (runs in Expo cloud, waits for result) ──────────────────
      - name: Build APK
        working-directory: EmployeeManagementSystem/ems-frontendNative
        run: |
          eas build \
            --profile ${{ steps.profile.outputs.name }} \
            --platform android \
            --non-interactive \
            --wait \
            --json > build-output.json
          cat build-output.json

      # ── 7. Extract artifact URL ───────────────────────────────────────────────
      - name: Get APK download URL
        id: apk
        working-directory: EmployeeManagementSystem/ems-frontendNative
        run: |
          URL=$(jq -r '.[0].artifacts.buildUrl // .[0].artifacts.applicationArchiveUrl // empty' build-output.json)
          if [ -z "$URL" ]; then
            echo "Could not extract APK URL from build output"
            cat build-output.json
            exit 1
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "APK URL: $URL"

      # ── 8. Download APK ───────────────────────────────────────────────────────
      - name: Download APK
        run: |
          curl -L "${{ steps.apk.outputs.url }}" -o tektalis-ems.apk
          ls -lh tektalis-ems.apk

      # ── 9a. Upload as workflow artifact (every build) ─────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tektalis-ems-${{ github.run_number }}
          path: tektalis-ems.apk
          retention-days: 30

      # ── 9b. Create GitHub Release (only on version tags) ─────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: tektalis-ems.apk
          name: "Tektalis EMS ${{ github.ref_name }}"
          body: |
            ## Tektalis EMS ${{ github.ref_name }}

            Built from commit ${{ github.sha }}

            ### Install
            Download `tektalis-ems.apk` below and install on your Android device.
            Make sure **Install from unknown sources** is enabled in Settings.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
