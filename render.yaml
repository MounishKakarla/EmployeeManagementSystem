databases:
  - name: ems-postgres
    plan: free
    databaseName: emsnew
    user: emsuser

services:
  # ── Unified FastAPI Backend (EMS APIs + chatbot + resume parser) ──────────
  - type: web
    name: ems-backend-python
    runtime: docker
    plan: free
    dockerfilePath: ./EmployeeManagementSystem/ems-backend-python/Dockerfile
    dockerContext: ./EmployeeManagementSystem/ems-backend-python
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: ems-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ems-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: ems-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: ems-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ems-postgres
          property: password
      - key: JWT_SECRET
        value: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B597
      - key: MAIL_USERNAME
        value: hrtektalis@gmail.com
      - key: MAIL_PASSWORD
        sync: false   # paste your Gmail app password in the Render dashboard
      - key: GROQ_API_KEY
        sync: false   # paste your Groq API key in the Render dashboard
      - key: TZ
        value: Asia/Kolkata
      - key: CORS_ALLOWED_ORIGINS
        value: https://ems-frontend-3a3h.onrender.com
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: None

  # ── React Frontend (Static Site — CDN, never sleeps) ──────────────────────
  - type: static
    name: ems-frontend
    rootDir: EmployeeManagementSystem/ems-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ems-backend-python.onrender.com/api
      - key: VITE_CHATBOT_API_URL
        value: https://ems-backend-python.onrender.com/api/chatbot
      - key: VITE_PARSER_URL
        value: https://ems-backend-python.onrender.com
      - key: VITE_SESSION_TIMEOUT_MS
        value: "900000"
